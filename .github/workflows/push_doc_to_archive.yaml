name: Push Doc to Archive

on:
  push:
    tags:
      - '*'

permissions:
  contents: read

jobs:
  trigger-docs-archive:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger docs archive
        env:
          DOCS_ARCHIVE_URL: ${{ vars.DOCS_ARCHIVE_URL }}
          DOCS_ARCHIVE_TOKEN: ${{ secrets.DOCS_ARCHIVE_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "$DOCS_ARCHIVE_URL" ]; then
            echo "DOCS_ARCHIVE_URL repository variable is not configured." >&2
            exit 1
          fi

          if [ -z "$DOCS_ARCHIVE_TOKEN" ]; then
            echo "DOCS_ARCHIVE_TOKEN repository secret is not configured." >&2
            exit 1
          fi

          tag_name="${GITHUB_REF#refs/tags/}"
          command="DOCS_REPO_URL=git@github.com:yaozheng-fang/docs.git CODE_REPO_PATH=git@github.com:volcengine/veadk-python.git DOCS_PROJECT=veadk RELEASE_TAG=${tag_name} OUTPUT_MODE=commit_and_pr bash scripts/run-docs-archive-on-tag.sh"
          payload="$(jq -n --arg command "$command" --arg cwd "." '{command: $command, cwd: $cwd, async: false}')"

          curl --fail --show-error --silent -X POST "$DOCS_ARCHIVE_URL" \
            -H 'Content-Type: application/json' \
            -H "Authorization: Bearer ${DOCS_ARCHIVE_TOKEN}" \
            -d "$payload"
